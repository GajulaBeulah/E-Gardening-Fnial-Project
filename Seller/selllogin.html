<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seller Login | SellerHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../header.css">

<style>
*{
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#1e5631,#4caf50);
display:flex;
flex-direction:column;
}

.container{
background:white;
width:360px;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
margin:auto;
}

h2{text-align:center;color:#1e5631;}
p{text-align:center;font-size:14px;color:#666;margin-bottom:20px;}

.input-group{margin-bottom:12px;}

input{
width:100%;
padding:10px;
margin-top:4px;
border-radius:5px;
border:1px solid #ccc;
}

input:focus{outline:none;border-color:#4caf50;}

input.error{
border-color:#f44336;
background-color:#ffebee;
}

.error-message{
color:#f44336;
font-size:12px;
margin-top:4px;
display:none;
}

.btn{
width:100%;
padding:10px;
background:#4caf50;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.btn:hover{background:#3e8e41;}

.extra{text-align:center;margin-top:15px;font-size:14px;}

.extra a{
color:#1e5631;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.extra a:hover{text-decoration:underline;}

#registerBox,#forgotBox{display:none;}

footer{
margin-top:auto;
background:#1e5631;
color:white;
text-align:center;
padding:15px;
}

#loginError{
color:red;
text-align:center;
margin-top:10px;
display:none;
font-weight:bold;
}

@media(max-width:400px){
.container{width:90%;}
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<p>Login to your account</p>

<div class="input-group">
<label>Email</label>
<input type="email" id="loginEmail">
<div class="error-message" id="loginEmailError"></div>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="loginPass">
<div class="error-message" id="loginPassError"></div>
</div>

<button class="btn" onclick="handleLogin()">Login</button>

<div id="loginError">❌ Invalid Email or Password</div>

<div class="extra">
New User? <a onclick="showRegister()">Create Account</a>
<br><br>
<a onclick="showForgot()">Forgot Password?</a>
</div>
</div>

<!-- REGISTER -->
<div id="registerBox">
<h2>Create User Account</h2>

<div class="input-group">
<label>Name</label>
<input type="text" id="name">
<div class="error-message" id="nameError"></div>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="regEmail">
<div class="error-message" id="regEmailError"></div>
</div>

<div class="input-group">
<label>Phone</label>
<input type="tel" id="phone">
<div class="error-message" id="phoneError"></div>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="regPass">
<div class="error-message" id="regPassError"></div>
</div>

<button class="btn" onclick="registerSeller()">Register</button>

<div class="extra">
Already have an account? <a onclick="showLogin()">Login</a>
</div>
</div>

<!-- FORGOT -->
<div id="forgotBox">
<h2>Forgot Password</h2>

<div class="input-group">
<label>Email</label>
<input type="email" id="forgotEmail">
<div class="error-message" id="forgotEmailError"></div>
</div>

<button class="btn" onclick="resetPassword()">Reset Password</button>

<div class="extra">
<a onclick="showLogin()">Back</a>
</div>
</div>

</div>

<footer>
<p>© 2026 Garden Decoration Services</p>
</footer>

<script>

// SWITCH BOXES
function showRegister(){hideAll();document.getElementById("registerBox").style.display="block";}
function showLogin(){hideAll();document.getElementById("loginBox").style.display="block";}
function showForgot(){hideAll();document.getElementById("forgotBox").style.display="block";}
function hideAll(){
document.getElementById("loginBox").style.display="none";
document.getElementById("registerBox").style.display="none";
document.getElementById("forgotBox").style.display="none";
}

// HANDLE LOGIN FLOW
function handleLogin(){
if(loginSeller()){
login();
}
}

// VALIDATION
function loginSeller(){
let email=document.getElementById("loginEmail").value;
let pass=document.getElementById("loginPass").value;

clearErrors();

if(email===""){
showError("loginEmail","loginEmailError","Enter email");
return false;
}
if(!isValidEmail(email)){
showError("loginEmail","loginEmailError","Invalid email");
return false;
}

if(pass===""){
showError("loginPass","loginPassError","Enter password");
return false;
}
if(pass.length<6){
showError("loginPass","loginPassError","Min 6 chars");
return false;
}

return true;
}

// LOGIN LOGIC
function login(){
let email=document.getElementById("loginEmail").value;
let password=document.getElementById("loginPass").value;

let seller_email="seller@gmail.com";
let seller_password="seller123";

if(email===seller_email && password===seller_password){
alert("✅ Login Successful");
window.location.href="../Seller/new/sellerdashboard.html";
}
else{
let error=document.getElementById("loginError");
error.style.display="block";

setTimeout(()=>{error.style.display="none";},3000);
}
}

// REGISTER
function registerSeller(){
alert("Registered Successfully");
showLogin();
}

// RESET
function resetPassword(){
alert("Reset link sent");
showLogin();
}

// HELPERS
function showError(inputId,errorId,msg){
document.getElementById(inputId).classList.add("error");
let err=document.getElementById(errorId);
err.innerText=msg;
err.style.display="block";
}

function clearErrors(){
document.querySelectorAll("input").forEach(i=>i.classList.remove("error"));
document.querySelectorAll(".error-message").forEach(e=>e.style.display="none");
document.getElementById("loginError").style.display="none";
}

function isValidEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

</script>

</body>
</html>
